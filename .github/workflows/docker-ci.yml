name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: setup docker
        uses: docker/setup-buildx-action@v3
      - name: docker-login
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build-backend
        run: |
          docker build -t remya99/employee-backend:latest ./backend
      - name: Build-frontend
        run: |
          docker build -t remya99/employee-frontend:latest ./frontend
      - name: Push Backend Image
        run: |
          docker push remya99/employee-backend:latest
      - name: Push frontend Image
        run: |
          docker push remya99/employee-frontend:latest
        
      
    
  
